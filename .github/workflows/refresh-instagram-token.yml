name: Refresh Instagram Token

on:
  schedule:
    - cron: "0 8 1 * *" # 1er de chaque mois à 8h UTC
  workflow_dispatch: # déclenchement manuel possible

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Refresh long-lived token
        id: refresh
        run: |
          RESPONSE=$(curl -s "https://graph.instagram.com/refresh_access_token?grant_type=ig_refresh_token&access_token=${{ secrets.INSTAGRAM_ACCESS_TOKEN }}")
          echo "response=$RESPONSE" >> $GITHUB_OUTPUT

          # Extraire le nouveau token et l'expiration
          NEW_TOKEN=$(echo "$RESPONSE" | jq -r '.access_token // empty')
          EXPIRES_IN=$(echo "$RESPONSE" | jq -r '.expires_in // 0')

          if [ -z "$NEW_TOKEN" ]; then
            echo "::error::Refresh échoué — réponse : $RESPONSE"
            exit 1
          fi

          EXPIRES_DAYS=$((EXPIRES_IN / 86400))
          echo "✅ Token renouvelé — expire dans ${EXPIRES_DAYS} jours."
          echo "new_token=$NEW_TOKEN" >> $GITHUB_OUTPUT
          echo "expires_days=$EXPIRES_DAYS" >> $GITHUB_OUTPUT

      - name: Update GitHub Secret
        env:
          GH_TOKEN: ${{ secrets.PAT_SECRETS_WRITE }}
        run: |
          # Nécessite un Personal Access Token avec permission "secrets:write"
          # Stocker ce PAT dans GitHub Secrets sous le nom PAT_SECRETS_WRITE.
          # Si ce secret est absent, cette étape échoue mais le token reste valide.
          if [ -z "$GH_TOKEN" ]; then
            echo "::warning::PAT_SECRETS_WRITE absent — mise à jour du secret ignorée."
            echo "::warning::Renouvelez manuellement le token dans GitHub Settings → Secrets."
            exit 0
          fi
          gh secret set INSTAGRAM_ACCESS_TOKEN \
            --body "${{ steps.refresh.outputs.new_token }}" \
            --repo "${{ github.repository }}"
          echo "✅ Secret GitHub mis à jour."

      - name: Summary
        run: |
          echo "## Refresh Instagram Token" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Date** : $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- **Expire dans** : ${{ steps.refresh.outputs.expires_days }} jours" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Si le secret n'a pas été mis à jour automatiquement (PAT absent), copier le nouveau token depuis les logs et le mettre à jour manuellement dans Settings → Secrets → INSTAGRAM_ACCESS_TOKEN." >> $GITHUB_STEP_SUMMARY
